<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>第 13 章：影像數值化與 QR 互動</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #e7c6ff; /* 老師指定的粉紫色 */
        }
        canvas {
            display: block;
        }

        /* QR Code 浮動視窗樣式 */
        .qr-container {
            position: absolute;
            top: 30px;
            right: 30px;
            width: 180px;
            background: white;
            padding: 15px;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            text-align: center;
            z-index: 1000;
            font-family: sans-serif;
        }
        .qr-container img {
            width: 100%;
            height: auto;
            border-radius: 5px;
        }
        .qr-container p {
            margin: 10px 0 0 0;
            font-size: 14px;
            color: #555;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="qr-container">
        <img src="qr.png" alt="QR Code" onerror="this.src='https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://github.com/'">
        <p>掃描 QR Code<br>開啟手機互動</p>
    </div>

    <script>
        let capture;
        let span = 15; // 數字間距

        function setup() {
            // 建立全螢幕畫布
            createCanvas(windowWidth, windowHeight);
            
            // 初始化攝影機
            capture = createCapture(VIDEO);
            capture.size(640, 480);
            capture.hide();
        }

        function draw() {
            // 背景粉紫色
            background('#e7c6ff');

            // 計算 60% 置中區域
            let displayW = width * 0.6;
            let displayH = height * 0.6;
            let startX = (width - displayW) / 2;
            let startY = (height - displayH) / 2;

            capture.loadPixels();

            push();
                // 鏡像修正
                translate(width, 0);
                scale(-1, 1);

                // 遍歷像素點並轉換為數字
                for (let x = 0; x < capture.width; x += span) {
                    for (let y = 0; y < capture.height; y += span) {
                        
                        // 取得顏色並計算亮度 (0-255)
                        let pixel = capture.get(x, y);
                        let bk = int((pixel[0] + pixel[1] + pixel[2]) / 3);

                        // 座標映射到 60% 中央區域
                        let drawX = map(x, 0, capture.width, startX, startX + displayW);
                        let drawY = map(y, 0, capture.height, startY, startY + displayH);
                        
                        let mirX = width - drawX;

                        // 繪製亮度數值
                        fill(bk); 
                        noStroke();
                        textSize(span * 0.7);
                        textAlign(CENTER, CENTER);
                        text(bk, mirX, drawY);
                    }
                }
            pop();
        }

        // 視窗縮放自動調整
        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
        }
    </script>
</body>
</html>
